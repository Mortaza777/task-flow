<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="new-password.css">
</head>

<body>

  <div class="container">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time" id="live-time"></span>
    </div>

    <!-- Back -->
    <div class="back-btn">
      <div class="back-icon" onclick="window.location.href='forget-password.html'">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Lock icon -->
      <div class="lock-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6c8fff" />
              <stop offset="100%" style="stop-color:#a78bfa" />
            </linearGradient>
          </defs>
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="url(#lockGrad)" stroke-width="1.8" />
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="url(#lockGrad)" stroke-width="1.8" stroke-linecap="round" />
          <circle cx="12" cy="16" r="1.5" fill="url(#lockGrad)" />
        </svg>
      </div>

      <div class="title">Reset<br>Password</div>
      <p class="subtitle">Enter your new password and confirm it.</p>

      <!-- New Password -->
      <div class="input-group">
        <label class="input-label">New Password</label>
        <div class="input-row">
          <svg class="icon-left" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            <circle cx="12" cy="16" r="1" fill="rgba(255,255,255,0.35)" />
          </svg>
          <input type="password" id="new-pass" placeholder="Enter new password" />
          <svg class="eye-btn" viewBox="0 0 24 24" onclick="togglePass('new-pass', this)">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="input-group">
        <label class="input-label">Confirm Password</label>
        <div class="input-row">
          <svg class="icon-left" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            <circle cx="12" cy="16" r="1" fill="rgba(255,255,255,0.35)" />
          </svg>
          <input type="password" id="confirm-pass" placeholder="Confirm new password" />
          <svg class="eye-btn" viewBox="0 0 24 24" onclick="togglePass('confirm-pass', this)">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="reset-btn" onclick="resetPassword()">Reset Password</button>
      <a class="back-link" href="login.html">Back to Login</a>
    </div>

    <!-- Home bar -->
    <div class="home-bar-wrap">
      <div class="home-bar"></div>
    </div>

  </div>

  <script src="new-password.js"></script>

</body>

</html>
