<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="forget-password.css">
</head>

<body>

  <div class="container">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-time" id="live-time"></span>
      <div class="status-icons">
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="title">Forgot<br>Password?</div>
      <p class="subtitle">Enter your email to reset your password.</p>

      <div class="input-group">
        <label class="input-label" for="email-input">Email Input</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          <input type="email" id="email-input" placeholder="Email Input" />
        </div>
      </div>

      <button class="send-btn" onclick="sendResetToken()">Send Reset Link</button>
      <a class="back-link" href="login.html">Back to Login</a>
    </div>

    <!-- Home Bar -->
    <div class="bottom-indicator">
      <div class="home-bar"></div>
    </div>

  </div>

  <script src="forget-password.js"></script>

</body>

</html>
